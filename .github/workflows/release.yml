name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # --- Download FFmpeg ---
      - name: Download FFmpeg
        shell: pwsh
        run: |
          $ffmpegUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $zipPath = "$env:TEMP\ffmpeg.zip"
          $extractPath = "$env:TEMP\ffmpeg-extract"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile $zipPath -UseBasicParsing
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
          $ffmpegDir = Get-ChildItem -Path $extractPath -Directory | Select-Object -First 1
          Copy-Item "$($ffmpegDir.FullName)\bin\ffmpeg.exe" "src-tauri\binaries\ffmpeg\ffmpeg.exe"
          Copy-Item "$($ffmpegDir.FullName)\bin\ffprobe.exe" "src-tauri\binaries\ffmpeg\ffprobe.exe"
          Write-Host "FFmpeg binaries copied"

      # --- Setup Python bundle ---
      - name: Setup Python embeddable bundle
        shell: pwsh
        run: .\scripts\setup-python-bundle.ps1

      # --- Watermark (download from repo release or skip) ---
      - name: Check watermark
        shell: pwsh
        run: |
          $wmPath = "src-tauri\binaries\watermark.png"
          if (Test-Path $wmPath) {
            Write-Host "watermark.png found"
          } else {
            Write-Host "::warning::watermark.png not found in src-tauri/binaries/ — dynamic watermark will be unavailable"
          }

      # --- Run checks before building ---
      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

      # --- Build Tauri ---
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Video Editor ${{ github.ref_name }}"
          releaseBody: |
            ## What's New in v0.5.0 — Reliability & Core Pipeline

            ### Job Queue Persistence
            - Job queue is now saved to disk on every state change and restored on app launch
            - Processing jobs reset to "queued" on restart; completed/failed are preserved
            - Added "completed at" timestamp display on finished jobs
            - "Clear" button now only removes completed/cancelled jobs via backend

            ### Error Handling Hardening
            - FFmpeg processes now have timeout guards (max of 30 min or 10× video duration)
            - Failed jobs show expandable error details with full FFmpeg stderr
            - App validates FFmpeg/FFprobe/Python availability on startup with diagnostic toast
            - Missing font files now fall back to system defaults instead of crashing

            ### Cross-Platform Font Resolution
            - Replaced hardcoded Windows font paths with platform-aware resolution
            - macOS: searches `/System/Library/Fonts/` and `/Library/Fonts/`
            - Linux: searches `/usr/share/fonts/truetype/` directories
            - Monospace font resolution for typewriter intro (Consolas / Menlo / DejaVu Sans Mono)

            ### Progress Tracking Polish
            - ETA display on processing jobs (estimated time remaining)
            - Per-phase labels: "Generating TTS…", "Transcribing…", "Rendering (1/2)…"
            - Progress guaranteed to reach 100% on completion
            - Queue toolbar shows "X/Y done" counter during processing

            ### Testing Infrastructure
            - 12 Rust unit tests for FFmpeg argument builders, codec resolution, font handling
            - CI: `cargo test` and `tsc --noEmit` run before building in release workflow
          releaseDraft: false
          prerelease: false
          tauriScript: npx tauri

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # --- Download FFmpeg ---
      - name: Download FFmpeg
        shell: pwsh
        run: |
          $ffmpegUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $zipPath = "$env:TEMP\ffmpeg.zip"
          $extractPath = "$env:TEMP\ffmpeg-extract"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile $zipPath -UseBasicParsing
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
          $ffmpegDir = Get-ChildItem -Path $extractPath -Directory | Select-Object -First 1
          Copy-Item "$($ffmpegDir.FullName)\bin\ffmpeg.exe" "src-tauri\binaries\ffmpeg\ffmpeg.exe"
          Copy-Item "$($ffmpegDir.FullName)\bin\ffprobe.exe" "src-tauri\binaries\ffmpeg\ffprobe.exe"
          Write-Host "FFmpeg binaries copied"

      # --- Setup Python bundle ---
      - name: Setup Python embeddable bundle
        shell: pwsh
        run: .\scripts\setup-python-bundle.ps1

      # --- Watermark (download from repo release or skip) ---
      - name: Check watermark
        shell: pwsh
        run: |
          $wmPath = "src-tauri\binaries\watermark.png"
          if (Test-Path $wmPath) {
            Write-Host "watermark.png found"
          } else {
            Write-Host "::warning::watermark.png not found in src-tauri/binaries/ — dynamic watermark will be unavailable"
          }

      # --- Build Tauri ---
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Video Editor ${{ github.ref_name }}"
          releaseBody: |
            ## What's New in v0.4.0

            ### Bug Fixes
            - **Fixed title bar drag & window controls** — Added missing Tauri v2 permissions for minimize, maximize, close, and drag
            - **Fixed edge-tts `--rate` argument** — TTS no longer fails due to `-10%` being parsed as a flag
            - **Fixed progress bar stuck at 0%** — Added phased progress tracking across TTS, transcription, and render stages

            ### Improvements
            - **Blurred-frame hook intro** — Typewriter intro now shows the source video's first frame (blurred & darkened) instead of a black background
            - **Phased progress tracking** — Progress bar smoothly updates: TTS (0-5%), transcription (5-15%), rendering (15-95%), finalize (95-100%)
            - **GPU detection spinner** — Shows loading animation while detecting GPU encoders
            - **Preset error toasts** — Save/load/delete preset failures now show user-visible error notifications
            - **Safer caption rendering** — Removed `.unwrap()` calls in caption filter building
            - **Cleaner production builds** — Gated Whisper debug output behind `#[cfg(debug_assertions)]`
            - **Updater stability** — Fixed potential double update check on startup
          releaseDraft: false
          prerelease: false
          tauriScript: npx tauri

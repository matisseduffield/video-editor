name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # --- Download FFmpeg ---
      - name: Download FFmpeg
        shell: pwsh
        run: |
          $ffmpegUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $zipPath = "$env:TEMP\ffmpeg.zip"
          $extractPath = "$env:TEMP\ffmpeg-extract"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile $zipPath -UseBasicParsing
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
          $ffmpegDir = Get-ChildItem -Path $extractPath -Directory | Select-Object -First 1
          Copy-Item "$($ffmpegDir.FullName)\bin\ffmpeg.exe" "src-tauri\binaries\ffmpeg\ffmpeg.exe"
          Copy-Item "$($ffmpegDir.FullName)\bin\ffprobe.exe" "src-tauri\binaries\ffmpeg\ffprobe.exe"
          Write-Host "FFmpeg binaries copied"

      # --- Setup Python bundle ---
      - name: Setup Python embeddable bundle
        shell: pwsh
        run: .\scripts\setup-python-bundle.ps1

      # --- Watermark (download from repo release or skip) ---
      - name: Check watermark
        shell: pwsh
        run: |
          $wmPath = "src-tauri\binaries\watermark.png"
          if (Test-Path $wmPath) {
            Write-Host "watermark.png found"
          } else {
            Write-Host "::warning::watermark.png not found in src-tauri/binaries/ — dynamic watermark will be unavailable"
          }

      # --- Build Tauri ---
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Video Editor ${{ github.ref_name }}"
          releaseBody: |
            ## What's New in v0.3.0

            ### New Features
            - **Custom Frameless Title Bar** — Sleek borderless window with integrated minimize/maximize/close controls
            - **Video Thumbnail Previews** — Automatically extracted thumbnails shown in job cards
            - **Drag-to-Reorder Queue** — Reorder jobs by dragging with dnd-kit, smooth animations
            - **Watch Folder Mode** — Monitor a folder for new video files, auto-queue them
            - **Inline Video Playback** — Play completed videos directly inside the app
            - **Custom Accent Color** — Pick any accent color from the sidebar color wheel
            - **Splash Screen** — Animated startup splash with app branding
            - **Framer Motion Transitions** — Smooth enter/exit animations for panels, cards, and overlays
            - **Micro-interactions** — Press feedback on buttons, hover lift on cards, scale effects throughout
            - **Parallel Job Processing** — Process up to 6 videos concurrently with configurable slider
            - **GPU Auto-Detection** — Detects NVIDIA NVENC, AMD AMF, Intel QSV, Apple VideoToolbox
            - **Settings Keyboard Navigation** — Ctrl+1 through Ctrl+5 to switch sidebar tabs
            - **Auto-Update with Changelog** — Shows version comparison and release notes when updates are available

            ### Bug Fixes & Improvements
            - Fixed dynamic import inefficiency in watch folder toggle
            - Removed unused `max_parallel` field from JobManager (now controlled per-invocation)
            - Progress bar gradient now respects custom accent color
          releaseDraft: false
          prerelease: false
          tauriScript: npx tauri
